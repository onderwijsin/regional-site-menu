name: Semantic Release

on:
  workflow_call:
    inputs:
      package:
        type: string
        default: 'all'
      build-command:
        type: string
        default: 'pnpm build'
      build-before-release:
        type: boolean
        default: true
      workspace-concurrency:
        type: number
        default: 1
      runner:
        type: string
        default: ubuntu-latest
    secrets:
      RELEASE_APP_ID:
        required: true
      RELEASE_APP_PRIVATE_KEY:
        required: true
      GH_PACKAGES_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  semantic-release:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup
        uses: ./.github/actions/setup
        with:
          gh-packages-token: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"

      - name: Build
        if: ${{ inputs.build-before-release }}
        run: ${{ inputs.build-command }}

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          HUSKY: '0'
        run: |
          set -euo pipefail

          echo "🔍 Running semantic-release for '${{ inputs.package }}'..."

          if [ "${{ inputs.package }}" = "root" ]; then
            pnpm exec semantic-release
          elif [ "${{ inputs.package }}" = "all" ]; then
            pnpm -r --workspace-concurrency=${{ inputs.workspace-concurrency }} exec semantic-release
          else
            pnpm --filter ${{ inputs.package }} exec semantic-release
          fi
