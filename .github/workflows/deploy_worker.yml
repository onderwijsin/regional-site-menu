name: Deploy Worker
on:
  workflow_call:
    inputs:
      environment:
        required: true
        description: 'The environment to deploy to'
        type: string
      working-directory:
        required: false
        description: 'The working directory for the deployment (relative to the repository root)'
        default: '.'
        type: string
      upload_version:
        # https://github.com/cloudflare/wrangler-action?tab=readme-ov-file#upload-a-worker-version
        required: false
        description:
          'Whether this deployment should upload a new Worker version (or be an actual deployment)'
        default: false
        type: boolean
      promote_uploaded_version:
        required: false
        description: 'Whether uploaded preview versions should be promoted to deployed'
        default: true
        type: boolean
      fetch-depth:
        required: false
        description: 'The git fetch depth for the checkout action'
        default: 1
        type: number
      timeout-minutes:
        required: false
        description: 'The timeout for the deployment job in minutes'
        default: 15
        type: number
      apply_db_migrations:
        required: false
        description: 'Whether to apply database migrations during deployment'
        default: false
        type: boolean
      runner:
        required: false
        description: 'Runner to execute the job on'
        default: ubuntu-latest
        type: string
    outputs:
      deployment-url:
        description: 'The deployment URL'
        value: ${{ jobs.deploy.outputs.deployment-url }}
      deployment-id:
        description: 'The deployment ID (if applicable)'
        value: ${{ jobs.deploy.outputs.deployment-id }}
      environment:
        description: 'The deployment environment'
        value: ${{ inputs.environment }}

jobs:
  deploy:
    name: 'Deploy to Cloudflare Worker'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      id-token: write
      deployments: write
      issues: write
      pull-requests: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
      # Deployment ID is only available when not uploading a version
      deployment-id: ${{ steps.create_deploy.outputs.deployment_id }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - uses: ./.github/actions/setup
        with:
          gh-packages-token: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Export environment variables
        id: export_env
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "Creating .env for build"

          # Dump vars into .env
          echo '${{ toJson(vars) }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' > .env

          # Dump secrets into .env
          echo '${{ toJson(secrets) }}' \
          | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> .env

          # Keep build/upload/runtime release alignment for Sentry
          echo "SENTRY_RELEASE=${GITHUB_SHA}" >> .env

          echo "Generated .env with $(wc -l < .env) entries"

      - name: Build Nuxt Application
        run: pnpm build
        working-directory: ${{ inputs.working-directory }}
        env:
          # https://hub.nuxt.com/docs/getting-started/deploy#environments
          CLOUDFLARE_ENV: ${{ inputs.environment }}

      - name: Create GitHub Deployment
        if: ${{ !inputs.upload_version }}
        id: create_deploy
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: ${{ inputs.environment }}
          description: 'Deploying Cloudflare Worker'
          transient-environment: false
          auto-merge: false

      - name: Install Wrangler
        run: pnpm add -g wrangler

      - name: Deploy Worker
        id: deploy
        working-directory: ${{ inputs.working-directory }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_NAME: ${{ vars.WORKER_NAME }}
          CLOUDFLARE_ACCOUNT_SLUG: ${{ vars.CLOUDFLARE_ACCOUNT_SLUG }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          set -euo pipefail

          echo "Environment: ${{ inputs.environment }}"
          echo "Upload as new version: ${{ inputs.upload_version }}"

          # Validate required variables
          if [ "${{ inputs.upload_version }}" != "true" ] && [ -z "${APP_URL:-}" ]; then
            echo "APP_URL is required for non-preview deployments"
            exit 1
          fi

          # Prevent version uploads for non-preview environments
          if [ "${{ inputs.upload_version }}" = "true" ] && [ "${{ inputs.environment }}" != "preview" ]; then
            echo "Version uploads are only allowed for preview"
            exit 1
          fi

          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"

          if [ "${{ inputs.upload_version }}" = "true" ]; then

            # Capture the Worker Version ID from the output
            OUTPUT=$(wrangler versions upload --env preview | tee /dev/stderr)

            VERSION_ID=$(echo "$OUTPUT" \
              | grep -Eo 'Worker Version ID: [a-f0-9-]+' \
              | awk '{print $4}')
            
            # Extract the prefix (before the first hyphen) for the deployment URL
            VERSION_PREFIX="${VERSION_ID%%-*}"

            if [ -z "$VERSION_ID" ]; then
              echo "❌ Failed to extract Worker Version ID"
              echo "Cannot promote preview deployment without a version ID."
              exit 1
            else 
              echo "✅ Extracted Worker Version ID: $VERSION_ID"

              if [ "${{ inputs.promote_uploaded_version }}" = "true" ]; then
                # Promote the uploaded version so the preview environment URL points
                # to the latest uploaded version.
                wrangler versions deploy "${VERSION_ID}@100%" \
                  --env preview \
                  --yes \
                  --message "Preview deploy for ${SHORT_SHA}"
              else
                echo "Skipping preview version promotion (promote_uploaded_version=false)."
              fi

              # Construct the deployment URL using the version ID
              DEPLOYMENT_URL="https://${VERSION_PREFIX}-${WORKER_NAME}.${CLOUDFLARE_ACCOUNT_SLUG}.workers.dev"
            fi
          else
            if [ "${{ inputs.environment }}" = "production" ]; then
              wrangler deploy
            else
              wrangler deploy --env "${{ inputs.environment }}"
            fi

            DEPLOYMENT_URL="$APP_URL"
          fi

          echo "Deployed to: $DEPLOYMENT_URL"
          echo "deployment-url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Apply Database Migrations
        if: |
          inputs.apply_db_migrations && 
          steps.deploy.outcome == 'success' && 
          !inputs.upload_version
        working-directory: ${{ inputs.working-directory }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          echo "Applying D1 migrations for environment: ${{ inputs.environment }}"

          if [ "${{ inputs.environment }}" = "production" ]; then
            wrangler d1 migrations apply DB --remote
          else
            wrangler d1 migrations apply DB --remote --env "${{ inputs.environment }}"
          fi

      - name: Mark Deployment as Successful
        if: ${{ success() && !inputs.upload_version }}
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.create_deploy.outputs.deployment_id }}
          state: success
          environment-url: ${{ steps.deploy.outputs.deployment-url }}

      - name: Mark Deployment as Failed
        if: ${{ failure() && !inputs.upload_version }}
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.create_deploy.outputs.deployment_id }}
          state: failure

        # If successful, always invalidate the Nuxt cache (even on version uploads to preview env)

      - name: Comment preview URL on PR
        if: |
          github.event.pull_request &&
          inputs.upload_version &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const url = "${{ steps.deploy.outputs.deployment-url }}"

            const now = new Date()

            const timestamp = new Intl.DateTimeFormat('nl-NL', {
              timeZone: 'Europe/Amsterdam',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: false
            }).format(now)

            const gifs = [
              "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExcG93bTRiNGkyMWtzeDhmcHh3NDBkaDRlYXN0bm5ldTYweGVrcTZ3ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/a0h7sAqON67nO/giphy.gif",
              "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExdjZhYng2eG4wOTFyN3JlYm02cG5zYTNvMWdkYnJxMnl4amN2bDh5bSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/6brH8dM3zeMyA/giphy.gif",
              "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExeDV2bXpuY3M0YnM4OTc5NGV6Nmpka3B0d3N1Y290c2xhYTJrN2doZiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/nXxOjZrbnbRxS/giphy.gif",
              "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExeDV2bXpuY3M0YnM4OTc5NGV6Nmpka3B0d3N1Y290c2xhYTJrN2doZiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/4xpB3eE00FfBm/giphy.gif",
              "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExeDV2bXpuY3M0YnM4OTc5NGV6Nmpka3B0d3N1Y290c2xhYTJrN2doZiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/111ebonMs90YLu/giphy.gif"
            ]

            const gif = gifs[Math.floor(Math.random() * gifs.length)]

            const body = `
            # 🚀 Preview deployment successful

            You can view the deployment at  
            **🔗 ${url}**

            **Time of deployment**: ${timestamp}

            <img src="${gif}" alt="Preview deployed" width="300" />
            `

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            })
