# Deploys new releases of the Nuxt application to NuxtHub
name: Release and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Pick an environment
        default: preview
        options:
          - preview
          - production
      release:
        type: boolean
        description:
          Whether to create a new release (and trigger release workflow) or just deploy the current
          commit
        default: true

permissions:
  id-token: write
  contents: write
  deployments: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      content_changes:
        ${{ steps.filter.outputs.content_changes || steps.nonpush.outputs.content_changes }}
      other_changes:
        ${{ steps.filter.outputs.other_changes || steps.nonpush.outputs.other_changes }}
    steps:
      - name: Checkout
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        if: ${{ github.event_name == 'push' }}
        uses: dorny/paths-filter@v4
        with:
          # On long-lived branches, compare with the previous commit on the same branch.
          base: ${{ github.ref }}
          predicate-quantifier: every
          filters: |
            content_changes:
              - 'content/**'
            other_changes:
              - '**'
              - '!content/**'

      - name: Set defaults for manual runs
        id: nonpush
        if: ${{ github.event_name != 'push' }}
        shell: bash
        run: |
          echo "content_changes=true" >> "$GITHUB_OUTPUT"
          echo "other_changes=false" >> "$GITHUB_OUTPUT"

  release:
    # Only trigger release workflow if the "release" input is set to true, and if the branch is "main"
    if: ${{ github.event.inputs.release == 'true' && github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/release.yml
    with:
      runner: blacksmith-4vcpu-ubuntu-2404
      build-command: pnpm nuxt:prepare
      package: root
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

  deploy:
    needs:
      - changes
    if: >-
      ${{
        github.event_name == 'workflow_dispatch'
        || (
          github.ref == 'refs/heads/main'
          && needs.changes.outputs.content_changes == 'true'
          && needs.changes.outputs.other_changes == 'false'
        )
      }}
    uses: ./.github/workflows/deploy_worker.yml
    with:
      runner: blacksmith-8vcpu-ubuntu-2404
      upload_version: false
      environment: >-
        ${{ github.event.inputs.environment
          || (github.ref == 'refs/heads/main' && 'production')
          || 'preview' }}
    secrets: inherit
