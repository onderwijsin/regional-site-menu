title: Kan ik later opnieuw een rapport genereren?
description: "Jazeker. Je kunt de gegevens beoordelingen altijd bijwerken en een nieuwe rapportage maken. Daarnaast kun je website opnieuw laten analyseren: zo kun je verbeteringen over tijd vergelijken en monitoren. Let wel op dat als we je website scrapen we deze resultaten 48 uur bewaren. Indien je daarna wijzigingen aan je site doorvoert, zien we die dus pas twee dagen later bij een volgende analyse."
