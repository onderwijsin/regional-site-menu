title: Moet ik alles in één keer invullen?
description: Nee. Je kunt de audit stapsgewijs doen. Scores en opmerkingen die je invult blijven bewaard op je apparaat, zodat je later verder kunt gaan waar je was gebleven. Daarnaast is het niet noodzakelijk om alle elementen te beoordelen vóórdat je de rapportage kunt genereren.