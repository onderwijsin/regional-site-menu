title: Hoe maak je een rapportage?
description: Selecteer de "aan de slag" modus en voeg een aantal beoordelingen toe op verschillende elementen. Klik vervolgens op de roze button in het menu (links van modus selectie) om een preview rapport te tonen. Klik vanuit de preview op "Genereer rapportage" om een PDF document te maken. Daarnaast heb je hier ook de mogelijkheid om de AI-functies in te schakelen.
