title: Is het gebruik van de tool anoniem?
description: De tool is volledig anoniem, de gegevens die je invult worden in de basis met niemand gedeeld. Ook het rapport dat je kunt maken en downloaden, wordt niet opgeslagen, bewaard of doorgestuurd. Alleen wanneer je de AI-briefing functie inzet, worden jouw scores en opmerking met de AI-provider gedeeld om als inhoudelijke input voor de briefing te fungeren.