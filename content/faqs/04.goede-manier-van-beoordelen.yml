title: Wat is een goede manier om te beoordelen?
description: Gebruik de score om eerlijk te beoordelen hoe goed een onderdeel nu op je site is uitgewerkt. Daarnaast raden we je aan een toelichting, opmerkingen of andere context te geven bij je beoordeling; dat maakt de rapportage veel concreter en bruikbaarder. Daarnaast werken de AI-functies beter naarmate je meer input levert.